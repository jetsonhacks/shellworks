# configs/endpoints/local_orin.toml
#
# Jetson Orin Nano — llama.cpp serving GGUF models.
# Server started via scripts/llama_server.sh.
# Port 8080 matches VLLM_BASE_URL=http://localhost:8080/v1 in the launcher.

name            = "local_orin"
provider_type   = "openai_compatible"
base_url        = "http://127.0.0.1:8080/v1"
api_key_env     = "LOCAL_LLM_API_KEY"
default_model   = "unsloth_Qwen3.5-4B-GGUF_Qwen3.5-4B-Q4_K_M.gguf"
