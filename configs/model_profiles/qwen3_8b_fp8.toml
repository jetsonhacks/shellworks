# configs/model_profiles/qwen3_8b_fp8.toml
#
# Qwen3-8B-FP8 served via vLLM on Jetson Thor.
# vLLM serves this as nvidia/Qwen3-8B-FP8 (the HuggingFace repo name).
#
# Reasoning control: request_kwargs
#   vLLM accepts enable_thinking via chat_template_kwargs in extra_body.
#   The model's chat template pre-fills <think></think> when enable_thinking
#   is False, skipping the reasoning phase at the model level.
#   No prompt marker is required for vLLM.
#
# Tool call parser: hermes (set in scripts/qwen3-thor.sh)

name                    = "qwen3_8b_fp8"
canonical_model         = "nvidia/Qwen3-8B-FP8"
reasoning_control       = "request_kwargs"
reasoning_kwargs_path   = "extra_body.chat_template_kwargs.enable_thinking"
