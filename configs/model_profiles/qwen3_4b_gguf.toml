# configs/model_profiles/qwen3_4b_gguf.toml
#
# Qwen3-4B-Q4_K_M served via llama.cpp on Jetson Orin Nano.
# llama.cpp reports the model name from the GGUF metadata, which for
# this file is "Qwen/Qwen3-4B-GGUF". Verify with the /v1/models endpoint
# if this does not resolve correctly after the server starts.
#
# Reasoning control: prompt_marker
#   llama.cpp ignores extra_body entirely. Reasoning is controlled via
#   Qwen3's /think and /no_think prompt tags, prepended to the system
#   message content before each request.

name                    = "qwen3_4b_gguf"
canonical_model         = "Qwen/Qwen3-4B-GGUF"
reasoning_control       = "prompt_marker"
reasoning_on_marker     = "/think"
reasoning_off_marker    = "/no_think"
